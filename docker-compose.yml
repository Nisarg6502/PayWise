version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ccopt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccopt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccopt_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ccopt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccopt} -d ${POSTGRES_DB:-ccopt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vector DB runs on Qdrant Cloud (set QDRANT_URL + QDRANT_API_KEY in backend/.env).
  # Uncomment below only if you want a local Qdrant instead:
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: ccopt-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"   # REST
  #     - "6334:6334"   # gRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  # qdrant_data:
